name: Fix empty dataset warning test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/include-symbol-in-empty-dataset-warning

      - uses: astral-sh/setup-uv@v6

      - name: Update the remaining warning assertion
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_history.py")
          text = path.read_text()
          old = 'assert "Skipping history_orders: dataset returned no columns" in caplog.text'
          new = (
              'assert ('
              '\n            "Skipping history_orders for symbol=GBPUSD: dataset returned no columns"'
              '\n            in caplog.text'
              '\n        )'
          )
          if text.count(old) != 1:
              raise SystemExit(f"expected one legacy assertion, got {text.count(old)}")
          path.write_text(text.replace(old, new))
          PY

          uv run ruff check --fix tests/test_history.py
          uv run ruff format tests/test_history.py
          uv run ruff check tests/test_history.py
          uv run ruff format --check tests/test_history.py
          uv run pytest --no-cov tests/test_history.py -k "write_rates_skips_empty_schema or incremental_history_orders_without_time"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_history.py
          git commit -m "Update empty dataset warning assertions"
          git push origin HEAD:agent/include-symbol-in-empty-dataset-warning
